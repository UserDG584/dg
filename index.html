<!DOCTYPE html>  
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #007BFF;
        }

        .flyer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .flyer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .socials {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .socials a {
            position: relative;
            display: inline-block;
        }

        .socials img {
            width: 8vw;
            max-width: 50px;
            min-width: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* HOTSPOT EFFECT */
        .socials a:hover img {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
        }

        /* OPTIONAL: tooltip */
        .socials a::after {
            content: attr(data-name);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .socials a:hover::after {
            opacity: 1;
        }
    </style>
</head>

<img src="assets/images/FlyerTest.jpg" alt="flyer">

<body>

  <div class="socials">
    <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" data-name="Facebook">
        <img src="/assets/images/facebook.png" alt="Facebook">
    </a>

    <a href="https://www.instagram.com/showhouse.insta/" target="_blank" data-name="Instagram">
        <img src="assets/images/insta.png" alt="Instagram">
    </a>
</div>

</body>
</html>
