<!DOCTYPE html>    
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        /* 🔒 LOCK PAGE */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* prevents scrolling */
        }

        body {
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #007BFF;
        }

        /* 🔒 LOCK ENTIRE LAYOUT */
        .flyer-container {
            position: fixed;
            inset: 0; /* shorthand for top, right, bottom, left = 0 */
            width: 100vw;
            height: 100vh;
        }

        /* MAIN FLYER */
        .flyer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* optional: prevents accidental drag */
        }

        /* SOCIAL ICONS */
        .socials {
            position: absolute;
            bottom: 1%;
            left: 44.5%;
            transform: translateX(-50%);
            display: flex;
            gap:  60 px;
        }

        .socials a {
            position: relative;
            display: inline-block;
        }

        .socials img {
            width: 8vw;
            max-width: 550px;
            min-width:100px;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            transform-origin: center;
        }

        /* 🔵 HOVER EFFECT */
        .socials a:hover img {
            transform: scale(1.1);
            box-shadow: 
                0 0 5px rgba(0, 123, 255, 0.8),
                0 0 10px rgba(0, 123, 255, 0.6),
                0 0 15px rgba(0, 123, 255, 0.4);
        }

        /* TOOLTIP */
        .socials a::after {
            content: attr(data-name);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .socials a:hover::after {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="flyer-container">
        <img class="flyer" src="assets/images/FlyerTest.jpg" alt="flyer">

        <div class="socials">
            <a href="https://www.instagram.com/showhouse.insta/" target="_blank" data-name="Instagram">
                <img src="assets/images/insta.png" alt="instagram">
            </a>

            <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" data-name="Facebook">
                <img src="assets/images/facebook.png" alt="Facebook">
            </a>
        </div>
    </div>

</body>
</html>
